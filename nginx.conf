worker_processes auto;
rtmp_auto_push on;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        notify_method get;

        application live {
            live on;
            record off;

            # YouTube Live
            push rtmp://a.rtmp.youtube.com/live2/${YOUTUBE_STREAM_KEY};

            # Facebook Live
            push rtmp://live-api-s.facebook.com:443/rtmp/${FACEBOOK_STREAM_KEY};

            # Instagram Live (via RTMP bridge)
            push rtmp://${INSTAGRAM_RTMP_HOST}/rtmp/${INSTAGRAM_STREAM_KEY};
        }
    }
}

http {
    include       /usr/local/nginx/conf/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 8080;

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }
    }
}
